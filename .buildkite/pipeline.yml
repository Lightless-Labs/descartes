steps:
  - label: ":linux: Linux ARM64"
    key: linux-arm64
    if: build.tag == null
    concurrency: 2
    concurrency_group: "big-cabbage/tart-ci"
    agents:
      queue: "ci-linux-arm64"
    plugins:
      - github.com/Lightless-Labs/tart-ci#v0.2.2:
          image: "ci-linux-arm64-rust-bazel"
          os: "linux"
          always_pull: false
          headless: true
    command: |
      set -euo pipefail

      if [[ -z "$${HOME:-}" || "$$HOME" == "/" ]]; then
        export HOME=/home/admin
      fi

      install_node() {
        local node_version="22.21.1"
        local uname_s uname_m node_platform archive_ext archive_url node_dir tmp_archive
        uname_s="$$(uname -s)"
        uname_m="$$(uname -m)"

        case "$$uname_s-$$uname_m" in
          Linux-aarch64|Linux-arm64)
            node_platform="linux-arm64"
            archive_ext="tar.xz"
            ;;
          *)
            echo "Unsupported Linux Node.js platform: $$uname_s $$uname_m" >&2
            exit 1
            ;;
        esac

        node_dir="$$HOME/.local/node-v$$node_version-$$node_platform"
        if [[ ! -x "$$node_dir/bin/node" ]]; then
          mkdir -p "$$node_dir"
          tmp_archive="$$(mktemp)"
          archive_url="https://nodejs.org/dist/v$$node_version/node-v$$node_version-$$node_platform.$$archive_ext"
          curl --proto '=https' --tlsv1.2 -fsSL "$$archive_url" -o "$$tmp_archive"
          tar -xJf "$$tmp_archive" -C "$$node_dir" --strip-components=1
          rm -f "$$tmp_archive"
        fi
        export PATH="$$node_dir/bin:$$PATH"
      }

      prepare_guest_checkout() {
        local source_dir work_dir
        source_dir="$$(pwd)"
        work_dir="$$HOME/descartes-checkout"
        rm -rf "$$work_dir"
        mkdir -p "$$work_dir"
        rsync -a --delete --exclude node_modules --exclude .git "$$source_dir/" "$$work_dir/"
        cd "$$work_dir"
      }

      install_node
      prepare_guest_checkout
      node --version
      npm --version

      npm ci
      npm test
      npm run smoke:cli
      npm run pack:dry-run

  - label: ":mac: macOS Apple Silicon"
    key: macos-apple-silicon
    if: build.tag == null
    concurrency: 2
    concurrency_group: "big-cabbage/tart-ci"
    agents:
      queue: "ci-macos-apple-silicon"
    plugins:
      - github.com/Lightless-Labs/tart-ci#v0.2.2:
          image: "ghcr.io/cirruslabs/macos-sequoia-base:latest"
          os: "macos"
          always_pull: false
          headless: true
    command: |
      set -euo pipefail

      if [[ -z "$${HOME:-}" ]]; then
        export HOME=/Users/admin
      fi

      install_node() {
        local node_version="22.21.1"
        local uname_s uname_m node_platform archive_ext archive_url node_dir tmp_archive
        uname_s="$$(uname -s)"
        uname_m="$$(uname -m)"

        case "$$uname_s-$$uname_m" in
          Darwin-arm64)
            node_platform="darwin-arm64"
            archive_ext="tar.gz"
            ;;
          *)
            echo "Unsupported macOS Node.js platform: $$uname_s $$uname_m" >&2
            exit 1
            ;;
        esac

        node_dir="$$HOME/.local/node-v$$node_version-$$node_platform"
        if [[ ! -x "$$node_dir/bin/node" ]]; then
          mkdir -p "$$node_dir"
          tmp_archive="$$(mktemp)"
          archive_url="https://nodejs.org/dist/v$$node_version/node-v$$node_version-$$node_platform.$$archive_ext"
          curl --proto '=https' --tlsv1.2 -fsSL "$$archive_url" -o "$$tmp_archive"
          tar -xzf "$$tmp_archive" -C "$$node_dir" --strip-components=1
          rm -f "$$tmp_archive"
        fi
        export PATH="$$node_dir/bin:$$PATH"
      }

      prepare_guest_checkout() {
        local source_dir work_dir
        source_dir="$$(pwd)"
        work_dir="$$HOME/descartes-checkout"
        rm -rf "$$work_dir"
        mkdir -p "$$work_dir"
        rsync -a --delete --exclude node_modules --exclude .git "$$source_dir/" "$$work_dir/"
        cd "$$work_dir"
      }

      install_node
      prepare_guest_checkout
      node --version
      npm --version

      npm ci
      npm test
      npm run smoke:cli
      npm run pack:dry-run

  - label: ":apple: Release macOS notifier"
    key: release-macos-notifier
    if: build.tag != null && build.tag =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
    concurrency: 1
    concurrency_group: "big-cabbage/descartes-release"
    agents:
      queue: "ci-macos-apple-silicon"
    plugins:
      - github.com/Lightless-Labs/tart-ci#v0.2.2:
          image: "ghcr.io/cirruslabs/macos-sequoia-base:latest"
          os: "macos"
          always_pull: false
          headless: true
          doppler_token_secret: DOPPLER_DESCARTES_PRD_NOTARISATION
          env:
            - BUILDKITE_TAG
    artifact_paths:
      - ".build/macos-notifier/release/*"
    command: |
      set -euo pipefail

      if [[ -z "$${HOME:-}" ]]; then
        export HOME=/Users/admin
      fi

      install_node() {
        local node_version="22.21.1"
        local uname_s uname_m node_platform archive_ext archive_url node_dir tmp_archive
        uname_s="$$(uname -s)"
        uname_m="$$(uname -m)"

        case "$$uname_s-$$uname_m" in
          Darwin-arm64)
            node_platform="darwin-arm64"
            archive_ext="tar.gz"
            ;;
          *)
            echo "Unsupported macOS Node.js platform: $$uname_s $$uname_m" >&2
            exit 1
            ;;
        esac

        node_dir="$$HOME/.local/node-v$$node_version-$$node_platform"
        if [[ ! -x "$$node_dir/bin/node" ]]; then
          mkdir -p "$$node_dir"
          tmp_archive="$$(mktemp)"
          archive_url="https://nodejs.org/dist/v$$node_version/node-v$$node_version-$$node_platform.$$archive_ext"
          curl --proto '=https' --tlsv1.2 -fsSL "$$archive_url" -o "$$tmp_archive"
          tar -xzf "$$tmp_archive" -C "$$node_dir" --strip-components=1
          rm -f "$$tmp_archive"
        fi
        export PATH="$$node_dir/bin:$$PATH"
      }

      prepare_guest_checkout() {
        local source_dir work_dir
        source_dir="$$(pwd)"
        work_dir="$$HOME/descartes-release-checkout"
        export DESCARTES_SHARED_CHECKOUT_DIR="$$source_dir"
        rm -rf "$$work_dir"
        mkdir -p "$$work_dir"
        rsync -a --delete --exclude node_modules --exclude .git "$$source_dir/" "$$work_dir/"
        cd "$$work_dir"
      }

      install_node
      prepare_guest_checkout
      node --version
      npm --version

      scripts/release-macos-notifier-buildkite.sh
      mkdir -p "$$DESCARTES_SHARED_CHECKOUT_DIR/.build/macos-notifier/release"
      rsync -a "$$HOME/descartes-release-checkout/.build/macos-notifier/release/" "$$DESCARTES_SHARED_CHECKOUT_DIR/.build/macos-notifier/release/"
